{# #vote-panel 的内部状态：结果区 + （未关闭时）投票/改票表单。 #}
{# 结果区订阅 SSE：投票后服务端推送新结果即时替换（R9 / U6）。 #}
<div id="results" hx-ext="sse" sse-connect="/p/{{ poll.id }}/stream" sse-swap="update">
  {% include "_results.html" %}
</div>

{% if not closed %}
<div style="margin-top:1.25rem;">
  {% if has_voted %}
  <h2>修改你的投票</h2>
  <p class="muted">结束前可随时覆盖你先前的选择。</p>
  {% endif %}
  {% include "_ballot_form.html" %}
</div>
{% endif %}
